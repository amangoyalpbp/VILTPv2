<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Saksham</title>
<style>
:root{
  --brand:#2563eb;--brand-600:#1d4ed8;--brand-700:#1e40af;
  --brand-soft:#eaf1fe;--brand-soft2:#f4f8ff;
  --ink:#0f1729;--muted:#64748b;--line:#eef1f6;--line2:#e7ebf3;
  --bg:#f5f7fb;--card:#fff;
  --green:#0f9d58;--green-s:#e6f6ec;--amber:#b7791f;--amber-s:#fdf3e2;--red:#dc2626;--red-s:#fdecec;--teal:#0f766e;--teal-s:#e3f4f1;--purple:#6941c6;--purple-s:#efe9fb;
  --radius:16px;--shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);--shadow-lg:0 10px 30px rgba(16,24,40,.12);
}
*{box-sizing:border-box}html,body{height:100%;margin:0}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
.app{display:flex;min-height:100vh}
/* sidebar */
.sidebar{width:248px;background:#fff;border-right:1px solid var(--line);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:20px 20px 14px;display:flex;align-items:center;gap:11px}
.brand .mk{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#1e3a8a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;box-shadow:0 4px 10px rgba(37,99,235,.3)}
.brand h1{font-size:19px;margin:0;letter-spacing:-.3px}.brand small{color:var(--muted);font-size:11px;font-weight:500}
.navlbl{font-size:10.5px;font-weight:700;letter-spacing:.09em;color:#9aa5b8;text-transform:uppercase;padding:6px 22px 6px}
.sidebar nav{padding:6px 12px;overflow-y:auto;flex:1}
.sidebar nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;color:#475069;margin-bottom:2px;font-size:13.5px;font-weight:500;cursor:pointer}
.sidebar nav a svg{color:#8a93a6;flex-shrink:0}
.sidebar nav a:hover{background:#f5f7fb;color:var(--ink)}
.sidebar nav a.active{background:var(--brand-soft);color:var(--brand);font-weight:600}
.sidebar nav a.active svg{color:var(--brand)}
.foot{padding:12px;margin:10px;border-top:1px solid var(--line)}
.chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:12px;cursor:pointer}
.chip:hover{background:#f5f7fb}
.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.chip .nm{font-size:13px;font-weight:600;line-height:1.1}.chip .rl{font-size:11px;color:var(--muted)}
.switch{width:100%;margin-top:6px;border:1px solid var(--line2);background:#fff;color:var(--muted);border-radius:10px;padding:8px;font-size:12px;font-weight:600}
.switch:hover{background:#f5f7fb;color:var(--ink)}
/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:20}
.topbar .date{font-size:13px;color:var(--muted);font-weight:500}
.topbar .rt{display:flex;align-items:center;gap:12px}
.livepill{display:inline-flex;align-items:center;gap:7px;background:#fdecec;color:var(--red);font-weight:600;font-size:12.5px;padding:7px 13px;border-radius:999px;border:none;cursor:pointer}
.livedot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}70%{box-shadow:0 0 0 7px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
.iconbtn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line2);background:#fff;color:#64748b;display:flex;align-items:center;justify-content:center;position:relative}
.iconbtn:hover{background:#f5f7fb}.iconbtn .dot{position:absolute;top:9px;right:10px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1.5px solid #fff}
.acct{display:flex;align-items:center;gap:9px;padding:5px 10px 5px 6px;border:1px solid var(--line2);border-radius:999px;background:#fff}
.acct:hover{background:#f5f7fb}.acct .nm{font-size:12.5px;font-weight:600;line-height:1.05}.acct .id{font-size:11px;color:var(--muted)}
.content{padding:24px 30px;max-width:1200px;width:100%}
/* headings */
h2.pt{font-size:23px;margin:0 0 4px;letter-spacing:-.4px}.psub{color:var(--muted);margin:0 0 20px;font-size:14px}
.navlbl2,h3.sec{font-size:11px;font-weight:700;letter-spacing:.07em;color:#9aa5b8;text-transform:uppercase;margin:26px 0 12px}
/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px}
.card .ch{padding:15px 18px;border-bottom:1px solid var(--line);font-weight:600;font-size:14.5px;display:flex;justify-content:space-between;align-items:center}
.card .cb{padding:18px}
/* kpi */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);display:flex;gap:13px;align-items:flex-start}
.kpi .ic{width:38px;height:38px;border-radius:11px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi .l{font-size:12.5px;color:var(--muted);font-weight:500}.kpi .v{font-size:23px;font-weight:750;letter-spacing:-.5px;margin-top:2px}.kpi .s{font-size:11px;color:#9aa5b8;margin-top:1px}
/* live banner */
.livebanner{display:flex;align-items:center;justify-content:space-between;gap:14px;background:linear-gradient(100deg,#1e3a8a,#2563eb);color:#fff;border-radius:16px;padding:16px 20px;margin-bottom:18px;box-shadow:0 8px 24px rgba(37,99,235,.28)}
.livebanner .lt{display:flex;align-items:center;gap:12px}
.livebanner .ld{width:9px;height:9px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}
.livebanner b{font-size:15px}.livebanner .sub{font-size:12.5px;opacity:.85}
.livebanner .go{background:#fff;color:var(--brand);border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:13px}
/* tables */
table.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
table.tbl th{background:#fafbfd;color:#7c8699;text-align:left;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:11px 14px;border-bottom:1px solid var(--line)}
table.tbl td{padding:12px 14px;border-top:1px solid var(--line);font-size:13.5px;vertical-align:middle}
table.tbl tbody tr:hover td{background:#fafbfe}
/* badges */
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap}
.b-gray{background:#f1f4f9;color:#5b6577}.b-blue{background:var(--brand-soft);color:var(--brand)}.b-green{background:var(--green-s);color:var(--green)}.b-amber{background:var(--amber-s);color:var(--amber)}.b-red{background:var(--red-s);color:var(--red)}.b-teal{background:var(--teal-s);color:var(--teal)}.b-purple{background:var(--purple-s);color:var(--purple)}
/* buttons */
.btn{border:1px solid var(--line2);background:#fff;color:var(--ink);padding:9px 15px;border-radius:10px;font-size:13px;font-weight:600}
.btn:hover{background:#f5f7fb}.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}.btn.primary:hover{background:var(--brand-600)}
.btn.danger{background:#fff;color:var(--red);border-color:#f3c9c9}.btn.danger:hover{background:#fdf0f0}
.btn.sm{padding:6px 11px;font-size:12px}.btn.ghost{border-color:transparent;background:transparent;color:var(--brand)}.btn.ghost:hover{background:var(--brand-soft)}
.btn:disabled{opacity:.45;cursor:not-allowed}.btnrow{display:flex;gap:8px;flex-wrap:wrap}
/* forms */
label.f{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
input.in,select.in,textarea.in{width:100%;padding:9px 11px;border:1px solid var(--line2);border-radius:10px;font-size:13px;background:#fff;color:var(--ink)}
input.in:focus,select.in:focus,textarea.in:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.field{margin-bottom:13px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.filters{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}.filters .field{margin:0;min-width:160px}
/* modal */
.mback{position:fixed;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;z-index:50;padding:44px 16px;overflow:auto}
.modal{background:#fff;border-radius:18px;width:100%;max-width:660px;box-shadow:var(--shadow-lg)}.modal.wide{max-width:920px}
.modal .mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal .mh h3{margin:0;font-size:17px}
.modal .mb{padding:22px;max-height:66vh;overflow:auto}.modal .mf{padding:15px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
.x{border:none;background:#f1f4f9;width:32px;height:32px;border-radius:9px;font-size:18px;color:var(--muted)}.x:hover{background:#e7ebf3}
/* toast */
.toasts{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:9px;z-index:100}
.toast{background:#0f1729;color:#fff;padding:12px 17px;border-radius:11px;font-size:13px;box-shadow:var(--shadow-lg);max-width:380px}.toast.err{background:var(--red)}.toast.ok{background:var(--green)}
.muted{color:var(--muted)}.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px}
.tabs button{border:none;background:none;padding:11px 15px;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;font-weight:600}.tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}
.empty{text-align:center;color:var(--muted);padding:34px;font-size:13.5px}.empty .big{font-size:15px;color:var(--ink);font-weight:600;margin-bottom:4px}
hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0}.help{font-size:12px;color:var(--muted);margin-top:5px}
.checkline{display:flex;align-items:center;gap:9px;font-size:13px;margin:7px 0}
.stat{display:flex;gap:26px;flex-wrap:wrap;margin:8px 0 16px}.stat .n{font-size:21px;font-weight:750}.stat .l{font-size:11px;color:var(--muted)}
.herorow{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.herocard{border-radius:18px;padding:22px 24px;color:#fff;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.herocard.blue{background:linear-gradient(135deg,#2563eb,#1e3a8a)}.herocard.teal{background:linear-gradient(135deg,#0f766e,#0b5c66)}
.herocard .hl{font-size:13px;opacity:.9;font-weight:600}.herocard .hv{font-size:44px;font-weight:800;line-height:1;margin:8px 0 2px;letter-spacing:-1px}.herocard .hs{font-size:12.5px;opacity:.85}
.herocard .hic{position:absolute;right:18px;top:18px;opacity:.35}
.picktbl-wrap{max-height:380px;overflow:auto;border:1px solid var(--line);border-radius:12px}
.picktbl{width:100%;border-collapse:collapse}
.picktbl th{position:sticky;top:0;z-index:2;background:#f4f6fb;color:#5b6577;text-align:left;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:11px 12px;border-bottom:1px solid var(--line2)}
.picktbl td{padding:10px 12px;border-top:1px solid var(--line);font-size:13px;vertical-align:middle}
.picktbl tbody tr:hover td{background:#fafbfe}
.picktbl input[type=checkbox]{width:16px;height:16px;cursor:pointer}
.picktbl input:disabled{opacity:.3;cursor:not-allowed}
.selall{display:flex;align-items:center;gap:18px;background:var(--brand-soft2);border:1px solid var(--brand-soft);border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px}
.selall label{display:flex;align-items:center;gap:7px;font-weight:600;color:var(--navy)}
.searchwrap{position:relative;margin-bottom:12px}
.searchwrap svg{position:absolute;left:12px;top:11px;color:#9aa5b8}
.searchwrap input{padding-left:36px}
.tag-new{display:inline-block;margin-left:8px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#0f766e;background:#e3f4f1;padding:2px 7px;border-radius:6px;vertical-align:middle}
.pill-legend{font-size:12.5px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:var(--teal)}
/* login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 500px at 50% -10%,#dbe7ff,transparent),linear-gradient(160deg,#f5f7fb,#eef3fc);padding:20px}
.lcard{background:#fff;border-radius:22px;padding:38px;width:100%;max-width:520px;box-shadow:var(--shadow-lg)}
.lbrand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.lcard h1{margin:0;font-size:26px;letter-spacing:-.5px}.lcard .tag{color:var(--muted);font-size:13px}
.lcard p.sub{color:var(--muted);margin:0 0 20px;font-size:14px}
.rbtn{display:flex;align-items:center;gap:14px;text-align:left;padding:15px 16px;border:1px solid var(--line2);border-radius:14px;background:#fff;width:100%;margin-bottom:11px}
.rbtn:hover{border-color:var(--brand);background:var(--brand-soft2);transform:translateY(-1px);transition:.12s}
.rbtn .ri{width:40px;height:40px;border-radius:11px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rbtn .rn{font-weight:700;font-size:14.5px}.rbtn .rd{font-size:12.5px;color:var(--muted)}
.rbtn .arw{margin-left:auto;color:var(--brand)}
/* classroom */
.classroom{background:#0b1220;color:#dfe6f2;border-radius:18px;min-height:470px;display:grid;grid-template-columns:1fr 320px;overflow:hidden;box-shadow:var(--shadow-lg)}
.classroom .stage{padding:20px;display:flex;flex-direction:column}
.classroom .slide{background:linear-gradient(160deg,#132038,#0e1a2f);border:1px solid #22314c;border-radius:14px;flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.classroom .slide .big{font-size:28px;font-weight:750;color:#fff}
.classroom .side{background:#0a0f1c;border-left:1px solid #1b2740;display:flex;flex-direction:column}
.classroom .side .tabs2{display:flex}.classroom .side .tabs2 button{flex:1;background:none;border:none;color:#8ea3c4;padding:12px;font-size:12px;border-bottom:2px solid transparent;font-weight:600}.classroom .side .tabs2 button.active{color:#fff;border-bottom-color:var(--brand)}
.classroom .side .body{flex:1;overflow:auto;padding:12px;font-size:12.5px}
.classroom .ctrl{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}.classroom .ctrl .btn{background:#182640;color:#dfe6f2;border-color:#28395a}.classroom .ctrl .btn.on{background:var(--brand);border-color:var(--brand);color:#fff}.classroom .ctrl .btn.rec{background:var(--red);border-color:var(--red);color:#fff}
.msg{margin-bottom:9px}.msg b{color:#cdd8ea}.ticker{color:#8ea3c4;font-style:italic;margin-bottom:7px}.part{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #172236}
@media(max-width:860px){.grid2,.grid3{grid-template-columns:1fr}.classroom{grid-template-columns:1fr}.acct .nm,.acct .id,.topbar .date{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<div id="modal"></div>
<div class="toasts" id="toasts"></div>
<script>
"use strict";
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const uid=p=>(p||'id')+'_'+Math.random().toString(36).slice(2,9);
const BUS=['Life','Health','Motor'],LANGS=['Hindi','English','Kannada','Telugu','Tamil'],MTYPES=['Session content','Takeaway','Both'];
const pct=(n,d)=>d?Math.round(n/d*100):0;
function fmtDT(iso){const d=new Date(iso);return d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})+' IST';}
function fmtD(iso){return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function parseCSV(t){const rows=[];let row=[],f='',i=0,q=false;t=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n');while(i<t.length){const c=t[i];if(q){if(c==='"'){if(t[i+1]==='"'){f+='"';i+=2;continue}q=false;i++;continue}f+=c;i++;continue}if(c==='"'){q=true;i++;continue}if(c===','){row.push(f);f='';i++;continue}if(c==='\n'){row.push(f);rows.push(row);row=[];f='';i++;continue}f+=c;i++}if(f.length||row.length){row.push(f);rows.push(row)}return rows.filter(r=>r.some(c=>c.trim()!==''));}
function toObjects(t,h){const rows=parseCSV(t);if(!rows.length)return[];const head=rows[0].map(x=>x.trim().toLowerCase());const out=[];for(let r=1;r<rows.length;r++){const o={};h.forEach(k=>{const idx=head.indexOf(k.toLowerCase());o[k]=idx>=0?(rows[r][idx]||'').trim():''});out.push(o)}return out;}
const TEMPLATES={cohorts:['partner code','partner language','BU','cohort ID','cohort name'],topics:['cohort ID','topic'],calendar:['topic','language','date','time','trainer','scheduled duration','walk-in allowed'],addpartners:['partner code']};
function dl(n,t){const b=new Blob([t],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);}
const now=()=>Date.now();
function computeStatus(s){if(s.status==='Cancelled')return'Cancelled';if(s.forceLive)return'Live';const st=new Date(s.startISO).getTime(),en=st+s.durationMin*60000,n=now();if(n<st-3e5)return'Scheduled';if(n<st)return'Waiting Room';if(n<en)return'Live';return'Completed';}
function eligible(topic,language){const c=new Set(db.topicMap.filter(t=>t.topic===topic).map(t=>String(t.cohortId)));return db.partners.filter(p=>c.has(String(p.cohortId))&&p.language===language);}
function sessEnr(id){return db.enrolments.filter(e=>e.sessionId===id)}
function att(id){return db.attendance.filter(a=>a.sessionId===id)}
function partner(c){return db.partners.find(p=>p.code===c)}
function trainer(id){return db.trainers.find(t=>t.id===id)}
function deriveBU(id){const en=db.enrolments.filter(e=>e.sessionId===id&&(e.source==='Assigned'||e.source==='Manually added'));const bus=[...new Set(en.map(e=>partner(e.partnerCode)&&partner(e.partnerCode).bu).filter(Boolean))];if(!bus.length)return'-';if(bus.length===1)return bus[0];if(bus.length===BUS.length)return'All';return'Multi-BU';}
function relevanceMismatch(s,p){if(!p)return null;const r=[];if(p.language!==s.language)r.push('language');const bu=deriveBU(s.id);if(bu!=='-'&&bu!=='All'&&bu!=='Multi-BU'&&p.bu!==bu)r.push('BU');const c=new Set(db.topicMap.filter(t=>t.topic===s.topic).map(t=>String(t.cohortId)));if(!c.has(String(p.cohortId)))r.push('topic');return r.length?r.join(', '):null;}
function badge(t,tone){const m={Scheduled:'blue','Waiting Room':'amber',Live:'green',Completed:'gray',Cancelled:'red',Assigned:'blue','Manually added':'purple','Walk-in registered':'teal','Walk-in joined':'teal',Active:'green',Archived:'gray'};return '<span class="badge b-'+(tone||m[t]||'gray')+'">'+esc(t)+'</span>';}
function initials(n){return (n||'?').replace(/\(.*\)/,'').trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();}
function personName(n){const m=(n||'').match(/\(([^)]+)\)/);return m?m[1]:(n||'').replace(/\s*\(.*\)/,'');}

const ICONS={
 dashboard:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/>',
 upload:'<path d="M12 15V3M8 7l4-4 4 4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>',
 sessions:'<rect x="3" y="4" width="18" height="17" rx="2.5"/><path d="M8 2v4M16 2v4M3 10h18"/>',

/* ===================== state ===================== */
let db=null;buildSeed();
const state={role:null,user:null,route:'#/',form:{},upload:null,modal:null,classroom:null};
let ticker=null;
function toast(msg,kind){const el=document.createElement('div');el.className='toast '+(kind||'ok');el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3200);}
function nav(r){state.route=r;render();}
function harvest(){document.querySelectorAll('[data-model]').forEach(el=>{state.form[el.dataset.model]=el.type==='checkbox'?el.checked:el.value;});}
const fv=k=>state.form[k]!==undefined?state.form[k]:'';
function audit(a,d,sid){db.audit.unshift({id:uid('AU'),action:a,detail:d,by:state.user?state.user.name:'System',atISO:new Date().toISOString(),sessionId:sid});}
function logN(a,t,c,sid){db.notifications.unshift({id:uid('N'),audience:a,trigger:t,channel:c,sessionId:sid,atISO:new Date().toISOString(),status:'Sent'});}
function liveSessions(){return db.sessions.filter(s=>computeStatus(s)==='Live');}
function relevantLive(){const L=liveSessions();if(state.role==='Partner'){const code=myCode();return L.filter(s=>db.enrolments.some(e=>e.sessionId===s.id&&e.partnerCode===code));}if(state.role==='Trainer')return L.filter(s=>s.trainerId===state.user.id);return L;}

/* ===================== actions ===================== */
function handle(act,el){harvest();const d=el.dataset;const p=act.split(':');const cmd=p[0],arg=p[1];
  switch(cmd){
    case'login':{const u=db.users.find(x=>x.role===arg)||{id:'x',name:arg,role:arg};state.role=arg;state.user=u;state.route=arg==='Trainer'?'#/trainer':arg==='Partner'?'#/partner':'#/admin';render();break;}
    case'logout':state.role=null;state.user=null;state.route='#/';render();break;
    case'reset':buildSeed();toast('Demo data reset');render();break;
    case'apply-filter':render();break;
    case'dl-template':dl(arg+'_template.csv',TEMPLATES[arg].join(',')+'\n');break;
    case'upload-apply':{const v=state.upload.results.filter(r=>r.ok).map(r=>r.row);applyUpload(state.upload.kind,v);state.upload=null;render();break;}
    case'upload-discard':state.upload=null;render();break;
    case'upl-history':state.modal={type:'uplhistory'};renderModal();break;
    case'upload-errfile':{const u=state.upload;if(!u)break;const bad=u.results.filter(r=>!r.ok);const cols=TEMPLATES[u.kind];dl(u.kind+'_errors.csv',[cols.concat('error').join(',')].concat(bad.map(r=>cols.map(c=>'"'+String(r.row[c]||'')+'"').concat('"'+r.errors.join('; ')+'"').join(','))).join('\n'));toast('Error file downloaded');break;}
    case'manage':openManage(arg);break;
    case'mtab':state.modal.tab=arg;renderModal();break;
    case'closeModal':state.modal=null;renderModal();break;
    case'add-single':addSingle();break;
    case'add-override':addSingle(true);break;
    case'add-cancelwarn':state.modal.warn=null;renderModal();break;
    case'rm-toggle':{const s=state.modal.sel;const i=s.indexOf(arg);if(i>=0)s.splice(i,1);else s.push(arg);renderModal();break;}
    case'rm-bulk':{state.modal.sel.forEach(c=>removePartner(state.modal.id,c));toast(state.modal.sel.length+' partner(s) removed');state.modal.sel=[];renderModal();render();break;}
    case'toggle-walkin':{const s=db.sessions.find(x=>x.id===state.modal.id);s.walkinAllowed=!s.walkinAllowed;audit('Session edit','Walk-in '+(s.walkinAllowed?'opened':'closed')+' for '+s.topic,s.id);toast('Walk-in '+(s.walkinAllowed?'opened':'closed'));renderModal();break;}
    case'substitute':{const s=db.sessions.find(x=>x.id===state.modal.id);const t=fv('subTrainer')||s.trainerId;const old=s.trainerId;s.trainerId=t;audit('Trainer substitution',s.topic+': '+((trainer(old)||{}).name||old)+' → '+((trainer(t)||{}).name||t),s.id);logN('Trainer','You have been assigned a session','Email, Push',s.id);toast('Trainer updated');renderModal();break;}
    case'toggle-rec':{const s=db.sessions.find(x=>x.id===state.modal.id);s.recordingViewable=!s.recordingViewable;audit('Recording access',(s.recordingViewable?'Enabled':'Disabled')+' partner recording access',s.id);toast('Recording access '+(s.recordingViewable?'enabled':'disabled'));renderModal();break;}
    case'monitor':state.modal=null;state.classroom={id:arg,mode:'monitor',slide:1,rec:true,muted:true,hand:false,chat:[{who:'System',text:'Monitoring session (read-only).'}],trans:[],tab:'people'};nav('#/classroom');break;
    case'sess-perf':state.modal={type:'sessperf',id:arg};renderModal();break;
    case'save-manage-mat':{const s=db.sessions.find(x=>x.id===state.modal.id);s.materialIds=state.modal.mat.slice();s.takeawayIds=state.modal.tk.slice();audit('Material updated','Session material updated',s.id);toast('Material saved to session');break;}
    case'reschedule':{const v=fv('resch');if(!v){toast('Pick a date & time','err');break;}const s=db.sessions.find(x=>x.id===state.modal.id);s.startISO=new Date(v).toISOString();audit('Date/time reschedule',s.topic+' moved',s.id);logN('Partner','Your session has a new time','WhatsApp, Email, Push',s.id);logN('Trainer','Session time updated','Email, Push',s.id);toast('Rescheduled and everyone notified');renderModal();render();break;}
    case'cancel':{const r=fv('cancelReason');if(!r){toast('Add a short reason','err');break;}const s=db.sessions.find(x=>x.id===state.modal.id);s.status='Cancelled';s.forceLive=false;s.cancelReason=r;audit('Session cancellation','Cancelled '+s.topic+': '+r,s.id);logN('Partner','A session was cancelled','WhatsApp, Email, Push',s.id);logN('Trainer','A session was cancelled','Email, Push',s.id);toast('Session cancelled');state.modal=null;renderModal();render();break;}
    case'repo-add':state.modal={type:'addmat',step:1,files:[],same:true,shared:{bu:'Life',language:'Hindi',type:'Session content',topic:'',author:''},perFile:[]};renderModal();break;
    case'addmat-same':state.modal.same=el.checked;renderModal();break;
    case'addmat-save':saveMaterials();break;
    case'archive':{const m=db.materials.find(x=>x.id===arg);m.status=m.status==='Active'?'Archived':'Active';audit('Content library change',(m.status==='Archived'?'Archived':'Restored')+' "'+m.title+'"');toast(m.status==='Archived'?'Moved to archive':'Restored');render();break;}
    case'export':exportCsv(arg);break;
    case'create-user':{const n=fv('newUserName');const r=fv('newUserRole')||'Training Admin';if(!n){toast('Enter a name','err');break;}const id=uid('U');db.users.push({id,name:n,role:r});if(r==='Trainer')db.trainers.push({id,name:n});audit('User creation','Created '+r+': '+n);toast(r+' added');state.form.newUserName='';render();break;}
    case'prepare':openPrepare(arg);break;
    case'mat-toggle':{const s=state.modal;const list=d.slot==='content'?s.mat:s.tk;const i=list.indexOf(arg);if(i>=0)list.splice(i,1);else list.push(arg);renderModal();break;}
    case'save-materials':{const s=db.sessions.find(x=>x.id===state.modal.id);s.materialIds=state.modal.mat.slice();s.takeawayIds=state.modal.tk.slice();toast('Material saved to session');state.modal=null;renderModal();render();break;}
    case'enter-class':state.modal=null;state.classroom={id:arg,mode:d.mode,slide:1,rec:false,muted:true,hand:false,chat:[{who:'System',text:'Session started. Welcome!'}],trans:[],tab:'chat'};nav('#/classroom');break;
    case'slide':{const s=state.classroom;s.slide=Math.max(1,Math.min(8,s.slide+(arg==='next'?1:-1)));render();break;}
    case'rec':{const s=state.classroom;s.rec=!s.rec;if(s.rec)s.chat.push({who:'System',text:'Recording started — participants notified.'});const ss=db.sessions.find(x=>x.id===s.id);if(ss)ss.recorded=s.rec;render();break;}
    case'mute':state.classroom.muted=!state.classroom.muted;render();break;
    case'hand':{const s=state.classroom;s.hand=!s.hand;s.chat.push({who:'System',text:state.user.name+(s.hand?' raised':' lowered')+' hand'});render();break;}
    case'chat-send':{const v=fv('chatMsg');if(!v||!v.trim())break;state.classroom.chat.push({who:state.user.name,text:v});state.form.chatMsg='';render();break;}
    case'class-tab':state.classroom.tab=arg;render();break;
    case'end-class':{if(ticker){clearInterval(ticker);ticker=null;}toast('Session ended');state.classroom=null;nav(state.role==='Partner'?'#/partner/past':'#/trainer');break;}
    case'leave-class':{if(ticker){clearInterval(ticker);ticker=null;}const c=state.classroom;if(c&&c.mode==='partner'){const code=myCode();const ss=db.sessions.find(x=>x.id===c.id);if(!db.attendance.find(a=>a.sessionId===c.id&&a.partnerCode===code))db.attendance.push({id:uid('A'),sessionId:c.id,partnerCode:code,durationMin:Math.round((ss&&ss.durationMin)||30),completed:true,source:'Walk-in joined'});state.classroom=null;state.modal={type:'feedback',id:c.id,fb:{overall:5,trainer:5,content:5,recommend:true,comment:''}};nav('#/partner');break;}state.classroom=null;nav(state.role==='Partner'?'#/partner':'#/trainer');break;}
    case'enrol':{walkinEnrol(arg,myCode(),'Walk-in registered');toast('You are enrolled. We will remind you before it starts.');render();break;}
    case'join-class':state.classroom={id:arg,mode:'partner',slide:1,rec:false,muted:true,hand:false,chat:[{who:'System',text:'You joined the session.'}],trans:[],tab:'chat'};nav('#/classroom');break;
    case'feedback':state.modal={type:'feedback',id:arg,fb:{overall:5,trainer:5,content:5,recommend:true,comment:''}};renderModal();break;
    case'star':state.modal.fb[d.k]=Number(arg);renderModal();break;

function dateDefaults(){const to=new Date();const from=new Date(to.getTime()-30*86400000);const f=d=>d.toISOString().slice(0,10);return {from:f(from),to:f(to)};}
function inRange(iso,from,to){const t=new Date(iso).getTime();if(from&&t<new Date(from).getTime())return false;if(to&&t>new Date(to).getTime()+86400000)return false;return true;}
function sessionCohorts(s){return [...new Set(db.topicMap.filter(t=>t.topic===s.topic).map(t=>t.cohortId))];}
function sessionStates(id){return [...new Set(sessEnr(id).map(e=>(partner(e.partnerCode)||{}).state).filter(Boolean))];}
function sessionRMs(id){return [...new Set(sessEnr(id).map(e=>(partner(e.partnerCode)||{}).rm).filter(Boolean))];}
function insightsFilter(){
  const d=dateDefaults();
  const from=fv('i_from')||d.from,to=fv('i_to')||d.to;
  const f={from,to,status:fv('i_status'),topic:fv('i_topic'),lang:fv('i_lang'),trainer:fv('i_trainer'),bu:fv('i_bu'),cohort:fv('i_cohort'),state:fv('i_state'),rm:fv('i_rm'),att:fv('i_att'),comp:fv('i_comp'),notif:fv('i_notif'),rec:fv('i_rec'),trans:fv('i_trans')};
  return db.sessions.filter(s=>{
    if(!inRange(s.startISO,f.from,f.to))return false;
    if(f.status&&computeStatus(s)!==f.status)return false;
    if(f.topic&&s.topic!==f.topic)return false;
    if(f.lang&&s.language!==f.lang)return false;
    if(f.trainer&&s.trainerId!==f.trainer)return false;
    if(f.bu&&deriveBU(s.id)!==f.bu)return false;
    if(f.cohort&&!sessionCohorts(s).map(String).includes(f.cohort))return false;
    if(f.state&&!sessionStates(s.id).includes(f.state))return false;
    if(f.rm&&!sessionRMs(s.id).includes(f.rm))return false;
    if(f.att==='has'&&att(s.id).length===0)return false;
    if(f.att==='none'&&att(s.id).length>0)return false;
    if(f.comp==='has'&&att(s.id).filter(a=>a.completed).length===0)return false;
    if(f.notif==='fail'&&!notifAgg(s.id).some(n=>n.failed>0))return false;
    if(f.notif==='clean'&&notifAgg(s.id).some(n=>n.failed>0))return false;
    if(f.rec&&recStatus(s)!==f.rec)return false;
    if(f.trans&&(s.transcriptStatus||'—')!==f.trans)return false;
    return true;
  });
}

  const tbl=table([
    {h:'Topic',c:s=>'<b>'+esc(s.topic)+'</b>'},{h:'Language',c:s=>esc(s.language)},
    {h:'Invited',c:s=>sessionMetrics(s.id).invited},
    {h:'Joined (inv/walk)',c:s=>{const M=sessionMetrics(s.id);return M.joined+' ('+M.joinedInv+'/'+M.joinedWk+')';}},
    {h:'Completed',c:s=>sessionMetrics(s.id).completed},
    {h:'Compl. %',c:s=>sessionMetrics(s.id).completionRate+'%'},
    {h:'Avg dur',c:s=>sessionMetrics(s.id).avgSpent+'m'},
    {h:'Drop-off',c:s=>sessionMetrics(s.id).dropoff+'%'},
    {h:'Feedback',c:s=>{const f=feedbackAgg(s.id);return f.overall;}},
    {h:'Trainer',c:s=>feedbackAgg(s.id).trainer},
    {h:'Content',c:s=>feedbackAgg(s.id).content},
    {h:'Recommend',c:s=>{const f=feedbackAgg(s.id);return f.n?f.recPct+'%':'-';}},
    {h:'Notif reach',c:s=>{const ns=notifAgg(s.id);const d=ns.reduce((t,x)=>t+x.delivered,0),tot=ns.reduce((t,x)=>t+x.delivered+x.failed+x.opted,0);return tot?pct(d,tot)+'%':'-';}},
    {h:'Recording',c:s=>badge(recStatus(s),recStatus(s)==='Available'?'green':recStatus(s)==='Restricted'?'amber':'gray')},
  ],list,{t:'No sessions in this range',s:'Widen the dates or clear a filter.'});
  return insightsFilterBar()+kpis+'<div class="btnrow" style="margin:0 0 12px"><button class="btn" data-act="export:sessionanalytics">Export sessions (CSV)</button></div><div class="card"><div class="cb" style="padding:0;overflow:auto">'+tbl+'</div></div>';
}
function insightsBreakdown(kind){
  const d=dateDefaults();const from=fv('b_from')||d.from,to=fv('b_to')||d.to;
  const base=db.sessions.filter(s=>inRange(s.startISO,from,to));
  const range='<div class="filters"><div class="field"><label class="f">From</label><input class="in" type="date" data-model="b_from" data-refilter value="'+from+'"></div><div class="field"><label class="f">To</label><input class="in" type="date" data-model="b_to" data-refilter value="'+to+'"></div></div>';

function trainerPerformance(){

  if(ft)mine=mine.filter(s=>s.topic===ft);if(fd)mine=mine.filter(s=>fd==='short'?s.durationMin<=45:s.durationMin>45);
  const sessions=mine.length,expected=mine.reduce((t,s)=>t+sessEnr(s.id).length,0),joined=mine.reduce((t,s)=>t+att(s.id).length,0),completed=mine.reduce((t,s)=>t+att(s.id).filter(a=>a.completed).length,0);

   '<div class="kpis">'+kpi('Sessions aligned for you',sessions,'in this period','sessions')+kpi('Partners joined',joined,'','trainings')+kpi('Partners completed',completed,'finished 75%+','past')+kpi('Completion rate',pct(completed,joined)+'%','','analytics')+kpi('Avg time in session',avgDur+' min','','past')+
   (more?kpi('Partners invited',expected,'','team')+kpi('Walk-in joins',walkins,'','available')+kpi('Session rating',fb.length?(fb.reduce((t,f)=>t+f.overall,0)/fb.length).toFixed(1):'-','out of 5','trainings')+kpi('Trainer rating',fb.length?(fb.reduce((t,f)=>t+f.trainer,0)/fb.length).toFixed(1):'-','out of 5','trainer'):'')+'</div>'+
   '<div style="margin-top:12px"><button class="btn ghost" onclick="state.form.perfMore='+(more?'false':'true')+';render()">'+(more?'Show less':'Show more metrics')+'</button></div>';
  return out;

function sessionMetrics(id){const s=db.sessions.find(x=>x.id===id)||{durationMin:60};const enr=sessEnr(id);const a=att(id);
  const invited=enr.filter(e=>e.source==='Assigned'||e.source==='Manually added').length;
  const walkinEnr=enr.filter(e=>String(e.source).indexOf('Walk-in')===0).length;
  const joinedInv=a.filter(x=>x.source==='Assigned'||x.source==='Manually added').length;
  const joinedWk=a.filter(x=>String(x.source).indexOf('Walk-in')===0).length;
  const joined=a.length,completed=a.filter(x=>x.completed).length;

  const RC=['#dc2626','#ef7c1a','#f0b429','#7cb342','#0f9d58'];
  const stars=k=>'<div style="display:flex;gap:5px">'+[1,2,3,4,5].map(n=>{const on=fb[k]>=n;const col=RC[fb[k]-1]||'#f0b429';return '<button class="btn sm" style="width:36px;'+(on?'background:'+col+';color:#fff;border-color:'+col:'')+'" data-act="star:'+n+'" data-k="'+k+'">'+n+'</button>';}).join('')+'</div>';
  const body='<p class="muted" style="margin-top:0">A quick rating from 1 (poor) to 5 (excellent).</p><div class="field"><label class="f">How was the session overall?</label>'+stars('overall')+'</div><div class="field"><label class="f">How was the trainer?</label>'+stars('trainer')+'</div><div class="field"><label class="f">Was the content useful?</label>'+stars('content')+'</div><div class="field"><label class="f">Would you recommend it?</label><div class="btnrow"><button class="btn '+(fb.recommend===true?'primary':'')+'" data-act="recommend:yes">Yes</button><button class="btn '+(fb.recommend===false?'primary':'')+'" style="'+(fb.recommend===false?'background:#dc2626;color:#fff;border-color:#dc2626':'')+'" data-act="recommend:no">No</button></div></div><div class="field"><label class="f">Anything to add? <span class="muted">(optional)</span></label><textarea class="in" rows="3" data-model="fbComment">'+esc(fv('fbComment'))+'</textarea></div>';
  return shell('Share your feedback',body,'<button class="btn primary" data-act="submit-feedback">Submit feedback</button>');
}
render();
</script>
</body>
</html>
